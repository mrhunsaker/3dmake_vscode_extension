name: Release On Tag

on:
  push:
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Lint extension
        run: npm run lint

      - name: Package VSIX
        run: npm run package

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-3dmake-gui-*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
