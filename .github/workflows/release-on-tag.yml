name: Release On Tag

on:
  push:
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (for example v2026.5.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "Release tag is required."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Lint extension
        run: npm run lint

      - name: Package VSIX
        run: |
          mkdir -p artifacts
          npx vsce package --out artifacts/vscode-3dmake-gui-${RELEASE_TAG}.vsix

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
